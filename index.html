<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excel Boubou</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;--accent:#c8f050;--accent2:#50f0c8;--text:#f0f0f0;--muted:#888;--danger:#f05050;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden;}
header{padding:20px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:100;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;letter-spacing:-0.03em;}
.logo span{color:var(--accent);}
.header-actions{display:flex;gap:10px;align-items:center;}
.btn{font-family:'DM Mono',monospace;font-size:0.75rem;padding:8px 16px;border-radius:4px;border:1px solid var(--border);cursor:pointer;transition:all 0.15s;background:transparent;color:var(--text);letter-spacing:0.05em;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn-accent{background:var(--accent);color:#0f0f0f;border-color:var(--accent);font-weight:500;}
.btn-accent:hover{background:#d4f560;color:#0f0f0f;}
.btn-accent:disabled{opacity:0.4;cursor:not-allowed;}
#upload-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 65px);padding:40px;animation:fadeIn 0.5s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.upload-box{border:1.5px dashed var(--border);border-radius:12px;padding:64px 80px;text-align:center;cursor:pointer;transition:all 0.2s;max-width:520px;width:100%;}
.upload-box:hover,.upload-box.drag-over{border-color:var(--accent);background:rgba(200,240,80,0.04);}
.upload-icon{font-size:3rem;margin-bottom:20px;display:block;}
.upload-title{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:700;margin-bottom:8px;}
.upload-sub{color:var(--muted);font-size:0.8rem;margin-bottom:24px;}
#file-input{display:none;}
#app-layout{display:none;height:calc(100vh - 65px);overflow:hidden;}
#app-layout.visible{display:flex;}
#table-area{flex:1;overflow:auto;padding:20px;background:var(--bg);}
.sheet-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap;}
.sheet-tab{font-family:'DM Mono',monospace;font-size:0.7rem;padding:5px 12px;border-radius:4px;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--muted);transition:all 0.15s;letter-spacing:0.05em;}
.sheet-tab.active{border-color:var(--accent);color:var(--accent);background:rgba(200,240,80,0.07);}
.table-wrapper{overflow:auto;border-radius:8px;border:1px solid var(--border);}
table{border-collapse:collapse;min-width:100%;font-size:0.78rem;}
th{background:var(--surface);padding:8px 12px;text-align:left;font-weight:500;border:1px solid var(--border);white-space:nowrap;color:var(--muted);font-size:0.7rem;letter-spacing:0.08em;text-transform:uppercase;position:sticky;top:0;z-index:10;}
td{padding:7px 12px;border:1px solid var(--border);cursor:pointer;transition:background 0.1s;min-width:80px;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:var(--surface);position:relative;}
td:hover{background:var(--surface2);}
td.selected{outline:2px solid var(--accent);outline-offset:-2px;background:rgba(200,240,80,0.08) !important;}
td.annotated::after{content:'';position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:var(--accent2);}
td.labeled::before{content:attr(data-label);position:absolute;top:1px;left:2px;font-size:0.55rem;background:var(--accent);color:#000;padding:0 3px;border-radius:2px;font-weight:600;letter-spacing:0.05em;pointer-events:none;}
#sidebar{width:300px;min-width:280px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-header{padding:16px 20px;border-bottom:1px solid var(--border);}
.sidebar-title{font-family:'Syne',sans-serif;font-size:0.85rem;font-weight:700;letter-spacing:0.03em;margin-bottom:4px;}
.cell-ref{font-size:0.7rem;color:var(--accent);min-height:16px;}
.sidebar-section{padding:16px 20px;border-bottom:1px solid var(--border);}
.sidebar-label{font-size:0.65rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;}
.color-grid{display:flex;gap:8px;flex-wrap:wrap;}
.color-swatch{width:26px;height:26px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:transform 0.1s,border-color 0.1s;}
.color-swatch:hover{transform:scale(1.15);}
.color-swatch.active{border-color:white;transform:scale(1.1);}
.label-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.75rem;padding:7px 10px;outline:none;transition:border-color 0.15s;}
.label-input:focus{border-color:var(--accent);}
.comment-textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.75rem;padding:10px;resize:vertical;min-height:90px;outline:none;transition:border-color 0.15s;line-height:1.5;}
.comment-textarea:focus{border-color:var(--accent2);}
.save-btn{margin-top:10px;width:100%;}
#annotations-list{flex:1;overflow-y:auto;padding:12px 16px;}
.annotation-item{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:8px;font-size:0.72rem;position:relative;}
.ann-ref{color:var(--accent);font-weight:500;margin-bottom:4px;}
.ann-comment{color:var(--muted);line-height:1.4;}
.ann-label{display:inline-block;background:var(--accent);color:#000;font-size:0.6rem;padding:1px 6px;border-radius:3px;margin-top:4px;font-weight:600;}
.ann-delete{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.8rem;padding:2px 5px;border-radius:3px;transition:color 0.15s;}
.ann-delete:hover{color:var(--danger);}
.ann-color-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle;}
.empty-state{text-align:center;color:var(--muted);font-size:0.75rem;padding:32px 20px;line-height:1.8;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
.no-select-msg{color:var(--muted);font-size:0.72rem;padding:20px;text-align:center;line-height:1.8;}
</style>
</head>
<body>
<header>
  <div class="logo">excel<span>·annot</span></div>
  <div class="header-actions">
    <button class="btn" id="reset-btn" style="display:none">↩ Nouveau fichier</button>
    <button class="btn btn-accent" id="export-btn" style="display:none" disabled>⬇ Exporter</button>
  </div>
</header>
<div id="upload-zone">
  <div class="upload-box" id="drop-zone">
    <span class="upload-icon">📊</span>
    <div class="upload-title">Déposez votre fichier Excel</div>
    <p class="upload-sub">Formats supportés : .xlsx, .xls, .csv</p>
    <button class="btn btn-accent" onclick="document.getElementById('file-input').click()">Choisir un fichier</button>
    <input type="file" id="file-input" accept=".xlsx,.xls,.csv">
  </div>
</div>
<div id="app-layout">
  <div id="table-area">
    <div class="sheet-tabs" id="sheet-tabs"></div>
    <div class="table-wrapper"><table id="data-table"></table></div>
  </div>
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Annotations</div>
      <div class="cell-ref" id="cell-ref">Sélectionnez une cellule</div>
    </div>
    <div id="annotation-form" style="display:none">
      <div class="sidebar-section">
        <div class="sidebar-label">Couleur de surlignage</div>
        <div class="color-grid" id="color-grid"></div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Étiquette / Catégorie</div>
        <input type="text" class="label-input" id="label-input" placeholder="ex: Urgent, Erreur…">
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Commentaire</div>
        <textarea class="comment-textarea" id="comment-input" placeholder="Ajoutez une note sur cette cellule…"></textarea>
        <button class="btn btn-accent save-btn" id="save-annotation-btn">Enregistrer</button>
      </div>
    </div>
    <div class="no-select-msg" id="no-select-msg">Cliquez sur une cellule<br>pour l'annoter</div>
    <div id="annotations-list"></div>
  </div>
</div>
<script>
var workbook=null,sheets={},currentSheet='',annotations={},selectedCell=null,selectedColor='#c8f050';
var COLORS=[{hex:'#c8f050'},{hex:'#50f0c8'},{hex:'#f0c850'},{hex:'#f05878'},{hex:'#7850f0'},{hex:'#50a8f0'},{hex:'#f09050'},{hex:'#f0f0f0'}];
var colorGrid=document.getElementById('color-grid');
COLORS.forEach(function(c){
  var sw=document.createElement('div');
  sw.className='color-swatch'+(c.hex===selectedColor?' active':'');
  sw.style.background=c.hex;
  sw.addEventListener('click',function(){
    document.querySelectorAll('.color-swatch').forEach(function(s){s.classList.remove('active');});
    sw.classList.add('active');selectedColor=c.hex;
  });
  colorGrid.appendChild(sw);
});
document.getElementById('file-input').addEventListener('change',function(e){loadFile(e.target.files[0]);});
var dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('drag-over');});
dz.addEventListener('dragleave',function(){dz.classList.remove('drag-over');});
dz.addEventListener('drop',function(e){e.preventDefault();dz.classList.remove('drag-over');if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);});
function loadFile(file){
  var reader=new FileReader();
  reader.onload=function(e){
    var data=new Uint8Array(e.target.result);
    workbook=XLSX.read(data,{type:'array'});
    sheets={};
    workbook.SheetNames.forEach(function(name){sheets[name]=XLSX.utils.sheet_to_json(workbook.Sheets[name],{header:1,defval:''}); });
    currentSheet=workbook.SheetNames[0];
    annotations={};
    renderApp();
  };
  reader.readAsArrayBuffer(file);
}
function renderApp(){
  document.getElementById('upload-zone').style.display='none';
  document.getElementById('app-layout').classList.add('visible');
  document.getElementById('reset-btn').style.display='';
  document.getElementById('export-btn').style.display='';
  document.getElementById('export-btn').disabled=false;
  renderTabs();renderTable();
}
function renderTabs(){
  var tabs=document.getElementById('sheet-tabs');tabs.innerHTML='';
  workbook.SheetNames.forEach(function(name){
    var tab=document.createElement('button');
    tab.className='sheet-tab'+(name===currentSheet?' active':'');
    tab.textContent=name;
    tab.addEventListener('click',function(){currentSheet=name;renderTabs();renderTable();deselectCell();});
    tabs.appendChild(tab);
  });
}
function colLetter(n){var s='';n++;while(n>0){s=String.fromCharCode(65+((n-1)%26))+s;n=Math.floor((n-1)/26);}return s;}
function cellKey(r,c){return currentSheet+'::'+r+'::'+c;}
function hexToRgba(hex,a){var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return 'rgba('+r+','+g+','+b+','+a+')';}
function renderTable(){
  var table=document.getElementById('data-table');table.innerHTML='';
  var rows=sheets[currentSheet]||[];
  if(!rows.length){table.innerHTML='<tr><td style="padding:20px;color:#888">Feuille vide</td></tr>';return;}
  var maxCols=Math.max.apply(null,rows.map(function(r){return r.length;}));
  var thead=document.createElement('thead');var trh=document.createElement('tr');
  trh.innerHTML='<th>#</th>';
  for(var c=0;c<maxCols;c++){var th=document.createElement('th');th.textContent=colLetter(c);trh.appendChild(th);}
  thead.appendChild(trh);table.appendChild(thead);
  var tbody=document.createElement('tbody');
  rows.forEach(function(row,ri){
    var tr=document.createElement('tr');
    var tdIdx=document.createElement('td');tdIdx.textContent=ri+1;tdIdx.style.color='var(--muted)';tdIdx.style.cursor='default';tdIdx.style.background='var(--surface)';tr.appendChild(tdIdx);
    for(var ci=0;ci<maxCols;ci++){
      var td=document.createElement('td');
      td.textContent=row[ci]!==undefined?row[ci]:'';
      var key=cellKey(ri,ci);var ann=annotations[key];
      if(ann){
        if(ann.color)td.style.background=hexToRgba(ann.color,0.25);
        if(ann.label){td.classList.add('labeled');td.setAttribute('data-label',ann.label);}
        td.classList.add('annotated');td.title=ann.comment||ann.label||'';
      }
      (function(tdEl,r,c){tdEl.addEventListener('click',function(){selectCell(tdEl,r,c);});})(td,ri,ci);
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  renderAnnotationsList();
}
function selectCell(td,ri,ci){
  document.querySelectorAll('td.selected').forEach(function(c){c.classList.remove('selected');});
  td.classList.add('selected');selectedCell={td:td,ri:ri,ci:ci};
  document.getElementById('cell-ref').textContent=colLetter(ci)+(ri+1)+' — '+currentSheet;
  document.getElementById('annotation-form').style.display='block';
  document.getElementById('no-select-msg').style.display='none';
  var key=cellKey(ri,ci);var ann=annotations[key]||{};
  document.getElementById('comment-input').value=ann.comment||'';
  document.getElementById('label-input').value=ann.label||'';
  if(ann.color){
    selectedColor=ann.color;
    document.querySelectorAll('.color-swatch').forEach(function(s){
      s.classList.toggle('active',s.style.backgroundColor===ann.color);
    });
  }
}
function deselectCell(){
  document.querySelectorAll('td.selected').forEach(function(c){c.classList.remove('selected');});
  selectedCell=null;
  document.getElementById('cell-ref').textContent='Sélectionnez une cellule';
  document.getElementById('annotation-form').style.display='none';
  document.getElementById('no-select-msg').style.display='';
}
document.getElementById('save-annotation-btn').addEventListener('click',function(){
  if(!selectedCell)return;
  var ri=selectedCell.ri,ci=selectedCell.ci;
  var key=cellKey(ri,ci);
  var comment=document.getElementById('comment-input').value.trim();
  var label=document.getElementById('label-input').value.trim();
  if(!comment&&!label){delete annotations[key];}
  else{annotations[key]={color:selectedColor,label:label,comment:comment};}
  renderTable();
  setTimeout(function(){
    var tds=document.querySelectorAll('tbody tr');
    if(tds[ri]){var td=tds[ri].querySelectorAll('td')[ci+1];if(td)selectCell(td,ri,ci);}
  },10);
});
function renderAnnotationsList(){
  var list=document.getElementById('annotations-list');
  var keys=Object.keys(annotations).filter(function(k){return k.indexOf(currentSheet+'::')===0;});
  if(!keys.length){list.innerHTML='<div class="empty-state">Aucune annotation<br>sur cette feuille</div>';return;}
  list.innerHTML='';
  keys.forEach(function(key){
    var parts=key.split('::');var r=parts[1];var c=parts[2];var ann=annotations[key];
    var item=document.createElement('div');item.className='annotation-item';
    item.innerHTML='<div class="ann-ref"><span class="ann-color-dot" style="background:'+(ann.color||'#888')+'"></span>'+colLetter(parseInt(c))+(parseInt(r)+1)+'</div>'+(ann.label?'<span class="ann-label">'+ann.label+'</span>':'')+(ann.comment?'<div class="ann-comment">'+ann.comment+'</div>':'')+'<button class="ann-delete" data-key="'+key+'" title="Supprimer">✕</button>';
    list.appendChild(item);
  });
  list.querySelectorAll('.ann-delete').forEach(function(btn){
    btn.addEventListener('click',function(){delete annotations[btn.dataset.key];renderTable();renderAnnotationsList();});
  });
}
document.getElementById('export-btn').addEventListener('click',function(){
  if(!workbook)return;
  var wb=XLSX.utils.book_new();
  workbook.SheetNames.forEach(function(sheetName){
    var rows=sheets[sheetName]||[];var ws=XLSX.utils.aoa_to_sheet(rows);
    Object.keys(annotations).filter(function(k){return k.indexOf(sheetName+'::')===0;}).forEach(function(key){
      var parts=key.split('::');var r=parts[1];var c=parts[2];var ann=annotations[key];
      var cellAddr=XLSX.utils.encode_cell({r:parseInt(r),c:parseInt(c)});
      if(!ws[cellAddr])ws[cellAddr]={t:'s',v:''};
      if(ann.comment)ws[cellAddr].c=[{a:'Annotation',t:ann.comment,T:true}];
      if(ann.label)ws[cellAddr].v=(ws[cellAddr].v?ws[cellAddr].v+' ':'')+('['+ann.label+']');
    });
    XLSX.utils.book_append_sheet(wb,ws,sheetName);
  });
  var annData=[['Feuille','Cellule','Étiquette','Commentaire','Couleur']];
  Object.keys(annotations).forEach(function(key){
    var parts=key.split('::');var sheet=parts[0];var r=parts[1];var c=parts[2];var ann=annotations[key];
    annData.push([sheet,colLetter(parseInt(c))+(parseInt(r)+1),ann.label||'',ann.comment||'',ann.color||'']);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(annData),'_Annotations');
  XLSX.writeFile(wb,'fichier_annote.xlsx');
});
document.getElementById('reset-btn').addEventListener('click',function(){
  workbook=null;sheets={};annotations={};selectedCell=null;
  document.getElementById('upload-zone').style.display='';
  document.getElementById('app-layout').classList.remove('visible');
  document.getElementById('reset-btn').style.display='none';
  document.getElementById('export-btn').style.display='none';
  document.getElementById('file-input').value='';
});
</script>
</body>
</html>
